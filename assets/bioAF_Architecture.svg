  <text x="995" y="248" text-anchor="middle" font-size="10" fill="#6B7280">HS256 tokens · Bearer auth</text>
  <text x="995" y="263" text-anchor="middle" font-size="10" fill="#6B7280">Public path bypass for health / login</text>


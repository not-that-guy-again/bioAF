name: Bug Report
description: Report a bug in bioAF
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: bioAF Version
      description: "Run `bioaf version` or check the footer in the UI"
      placeholder: "e.g., v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Control Plane (UI / API)
        - Experiment Tracking
        - Data Management
        - SLURM / Compute
        - Pipelines (Nextflow / Snakemake)
        - Notebooks (Jupyter / RStudio)
        - Visualization (cellxgene / QC Dashboard)
        - Package Management / GitOps
        - Auth / Users
        - Backup / Recovery
        - Terraform / Infrastructure
        - CLI (bioaf deploy / upgrade / destroy)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error messages, stack traces, or screenshots.
    validations:
      required: false

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bioaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: ${POSTGRES_DB:-bioaf}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bioaf} -d ${POSTGRES_DB:-bioaf}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    environment:
      PYTHONPATH: /app
      RUN_MIGRATIONS: "false"
      BIOAF_DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://bioaf:CHANGE_ME@db:5432/bioaf}
      BIOAF_JWT_SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_TO_RANDOM_STRING}
      BIOAF_ENVIRONMENT: ${BIOAF_ENVIRONMENT:-production}
      BIOAF_DEBUG: "false"
      BIOAF_USE_SECRET_MANAGER: "false"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

volumes:
  pgdata:
